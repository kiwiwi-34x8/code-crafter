<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CodeQuest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0230, #07155d);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Elements */
    .floating-elements {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    .floating-element {
      position: absolute;
      font-size: 24px;
      animation: float 6s ease-in-out infinite;
    }

    .floating-element:nth-child(1) {
      top: 10%;
      left: 5%;
      animation-delay: 0s;
    }

    .floating-element:nth-child(2) {
      top: 20%;
      right: 10%;
      animation-delay: 2s;
    }

    .floating-element:nth-child(3) {
      bottom: 15%;
      left: 15%;
      animation-delay: 4s;
    }

    .floating-element:nth-child(4) {
      bottom: 25%;
      right: 5%;
      animation-delay: 1s;
    }

    .floating-element:nth-child(5) {
      top: 40%;
      left: 8%;
      animation-delay: 3s;
    }

    .floating-element:nth-child(6) {
      top: 60%;
      right: 15%;
      animation-delay: 5s;
    }

    /* Welcome Text Animation */
    .welcome-container {
      position: relative;
      margin-bottom: 40px;
      text-align: center;
      z-index: 2;
    }

    .welcome-text {
      font-size: 3.5rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 10px rgba(255, 126, 95, 0.7);
      animation: popIn 1s ease-out;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: 0;
      animation: fadeInUp 1s ease-out 0.8s forwards;
      color: #e16811;
      text-shadow: 0 0 5px rgba(255, 221, 0, 0.5);
    }

    /* Login Container */
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideUp 1s ease-out 0.5s both;
      position: relative;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .login-container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #ff7e5f;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.9);
      transition: all 0.3s;
    }

    .input-group input:focus {
      background: white;
      box-shadow: 0 0 10px rgba(255, 126, 95, 0.5);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #ff7e5f;
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      background: #ff6347;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .login-btn:active {
      transform: translateY(-1px);
    }

    .login-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .login-btn:hover::after {
      left: 100%;
    }

    .extra-links {
      margin-top: 20px;
      font-size: 14px;
    }

    .extra-links a {
      color: #ff7e5f;
      text-decoration: none;
      margin: 0 5px;
      transition: color 0.3s;
    }

    .extra-links a:hover {
      color: #feb47b;
      text-decoration: underline;
    }

    /* Animations */
    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(-50px);
      }
      70% {
        opacity: 1;
        transform: scale(1.1) translateY(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes slideUp {
      from { 
        opacity: 0; 
        transform: translateY(50px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(20px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .welcome-text {
        font-size: 2.5rem;
      }
      
      .login-container {
        max-width: 90%;
      }
      
      .floating-elements {
        display: none;
      }
    }
  </style>
</head>
<body>
  

  <!-- Welcome Text -->
  <div class="welcome-container">
    <h1 class="welcome-text">Welcome Code Crafters!</h1>
    <p class="subtitle">Start your coding adventure today</p>
  </div>

  <!-- Login Form -->
  <div class="login-container">
    <h2>Login to Your Account</h2>
    <form action="/login" method="POST">
      <div class="input-group">
        <label for="email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="extra-links">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>
</body>
</html>
